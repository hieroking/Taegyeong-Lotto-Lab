name: Windows EXE 자동 빌드 및 Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release 버전"
        required: true
        default: "v3.1.0"
  push:
    branches: [main]
    paths:
      - "app.py"
      - "requirements.txt"
      - ".github/workflows/windows-release.yml"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 라이브러리 설치
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 단일 EXE 생성
        shell: pwsh
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --windowed `
            --onefile `
            --name "TaegyeongLottoLab" `
            --collect-all PySide6 `
            --collect-all pandas `
            --hidden-import openpyxl `
            app.py

      - name: EXE 확인
        shell: pwsh
        run: |
          if (!(Test-Path "dist/TaegyeongLottoLab.exe")) {
            throw "EXE 생성 실패"
          }
          Get-Item "dist/TaegyeongLottoLab.exe" |
            Format-List Name, Length, FullName

      - uses: actions/upload-artifact@v4
        with:
          name: TaegyeongLottoLab-Windows-v3.1.0
          path: dist/TaegyeongLottoLab.exe
          if-no-files-found: error
          retention-days: 30

      - name: 수동 실행 시 Release 등록
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          gh release view "$env:RELEASE_VERSION" *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload "$env:RELEASE_VERSION" `
              "dist/TaegyeongLottoLab.exe" --clobber
          } else {
            gh release create "$env:RELEASE_VERSION" `
              "dist/TaegyeongLottoLab.exe" `
              --title "太炅 Lotto Lab $env:RELEASE_VERSION" `
              --notes "추천 조합에 공동출현 페어, 궁합 점수, 색상 표시와 가중치 기능을 추가했습니다."
          }
