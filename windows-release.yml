name: Windows EXE 자동 빌드 및 Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release 버전"
        required: true
        default: "v2.0.0"
  push:
    branches: [main]
    paths:
      - "app.py"
      - "requirements.txt"
      - "windows_ocr.ps1"
      - ".github/workflows/windows-release.yml"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 라이브러리 설치
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Windows 프로그램 생성
        shell: pwsh
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --windowed `
            --onedir `
            --name "TaegyeongLottoLab" `
            --collect-all PySide6 `
            --collect-all pandas `
            --hidden-import openpyxl `
            --add-data "windows_ocr.ps1;." `
            app.py

      - name: 필수 파일 확인
        shell: pwsh
        run: |
          if (!(Test-Path "dist/TaegyeongLottoLab/TaegyeongLottoLab.exe")) {
            throw "EXE 생성 실패"
          }
          if (!(Test-Path "dist/TaegyeongLottoLab/_internal/windows_ocr.ps1") -and
              !(Test-Path "dist/TaegyeongLottoLab/windows_ocr.ps1")) {
            throw "windows_ocr.ps1 누락"
          }

      - name: 배포 ZIP 생성
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "dist/TaegyeongLottoLab/*" `
            -DestinationPath "TaegyeongLottoLab-Windows-v2.0.0.zip" `
            -Force

      - uses: actions/upload-artifact@v4
        with:
          name: TaegyeongLottoLab-Windows-v2.0.0
          path: TaegyeongLottoLab-Windows-v2.0.0.zip
          if-no-files-found: error
          retention-days: 30

      - name: 수동 실행 시 Release 등록
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          gh release view "$env:RELEASE_VERSION" *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload "$env:RELEASE_VERSION" `
              "TaegyeongLottoLab-Windows-v2.0.0.zip" --clobber
          } else {
            gh release create "$env:RELEASE_VERSION" `
              "TaegyeongLottoLab-Windows-v2.0.0.zip" `
              --title "太炅 Lotto Lab $env:RELEASE_VERSION" `
              --notes "Windows 내장 OCR 기반 안정화 버전."
          }
