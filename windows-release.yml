name: Windows EXE 자동 빌드 및 Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release 버전 (예: v0.2.0)"
        required: true
        default: "v0.3.1"
  push:
    branches: [main]
    paths:
      - "app.py"
      - "requirements.txt"
      - ".github/workflows/windows-release.yml"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: EXE 생성
        shell: pwsh
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --windowed `
            --onefile `
            --name "TaegyeongLottoLab" `
            --collect-all PySide6 `
            --collect-all pandas `
            --hidden-import openpyxl `
            --collect-all rapidocr_onnxruntime `
            --collect-all onnxruntime `
            --collect-all cv2 `
            app.py
      - uses: actions/upload-artifact@v4
        with:
          name: TaegyeongLottoLab-Windows-v0.3.1
          path: dist/TaegyeongLottoLab.exe
          if-no-files-found: error
          retention-days: 30
      - name: 수동 실행 시 Release 등록
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          gh release view "$env:RELEASE_VERSION" *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload "$env:RELEASE_VERSION" "dist/TaegyeongLottoLab.exe" --clobber
          } else {
            gh release create "$env:RELEASE_VERSION" "dist/TaegyeongLottoLab.exe" `
              --title "太炅 Lotto Lab $env:RELEASE_VERSION" `
              --notes "Excel 분석, 번호 입력, 통계, 추천 조합 및 조합 검사 기능 추가."
          }
