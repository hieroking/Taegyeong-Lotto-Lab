name: Windows EXE 자동 빌드 v31

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "app.py"
      - "research_worker.py"
      - "requirements.txt"
      - ".github/workflows/windows-release.yml"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: 필수 모듈 설치
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: 구문 검사
        shell: pwsh
        run: python -m py_compile app.py research_worker.py

      - name: 연구 엔진 EXE
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --console `
            --name research_worker `
            --collect-all pandas `
            --collect-all openpyxl `
            research_worker.py

      - name: 메인 GUI EXE
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed `
            --name Taegyeong_Lotto_Lab_v31 `
            --collect-all PySide6 `
            --collect-all pandas `
            --collect-all openpyxl `
            app.py

      - name: 배포 ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release\Taegyeong_Lotto_Lab_v31 | Out-Null
          Copy-Item dist\Taegyeong_Lotto_Lab_v31.exe release\Taegyeong_Lotto_Lab_v31\
          Copy-Item dist\research_worker.exe release\Taegyeong_Lotto_Lab_v31\
          if (Test-Path "사용방법.md") { Copy-Item "사용방법.md" release\Taegyeong_Lotto_Lab_v31\ }
          if (Test-Path "프로젝트_백서.md") { Copy-Item "프로젝트_백서.md" release\Taegyeong_Lotto_Lab_v31\ }
          if (Test-Path "대화_결정사항_요약.md") { Copy-Item "대화_결정사항_요약.md" release\Taegyeong_Lotto_Lab_v31\ }
          Compress-Archive -Path release\Taegyeong_Lotto_Lab_v31 `
            -DestinationPath release\Taegyeong_Lotto_Lab_v31_Windows.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: Taegyeong-Lotto-Lab-v31-Windows
          path: release/Taegyeong_Lotto_Lab_v31_Windows.zip
          if-no-files-found: error
          retention-days: 30
